syntax = "proto3";

package lightrag.eventbus.topics.v1;

option go_package = "github.com/juncaifeng/LightRAG/go-eventbus/sdk/v1/go/topics;topics";

// ==========================================
// index.retriever.retrieve
// ==========================================

message RetrieveInput {
    string index_name = 1;                          // 目标索引名称，如 "thesaurus"
    string query = 2;                               // 检索查询文本
    int32 top_k = 3;                                // 返回结果数量，默认 20

    // --- 召回策略控制 ---
    float semantic_ratio = 4;                       // 0=纯文本，1=纯语义；默认由服务配置决定
    repeated float query_vector = 5 [packed = true]; // 可选：预计算查询向量（不传则由 Retriever 内部调 Embedding）
    string embedder = 6;                            // embedder 名称，默认 "default"

    // --- 过滤与截断 ---
    float score_threshold = 7;                      // 最小相关性分数（如 0.65）
    string filter_expr = 8;                         // 底层索引过滤表达式（如 Meilisearch filter 语法）
}

message RetrieveResult {
    string document_id = 1;
    float score = 2;
    string content = 3;                             // 原始文本或高亮文本（可选）
    map<string, string> fields = 4;                 // 结构化字段（JSON 字符串或纯文本）
}

message RetrieveOutput {
    repeated RetrieveResult results = 1;
    int32 total_hits = 2;                           // 命中总数（含被 threshold 过滤掉的）
    string index_name = 3;                          // 回显索引名
}
