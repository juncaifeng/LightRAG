syntax = "proto3";

package lightrag.eventbus.topics.v1;

option go_package = "github.com/juncaifeng/LightRAG/go-eventbus/sdk/v1/go/topics;topics";

// ==========================================
// index.builder.build
// ==========================================

enum IndexBuildAction {
    INDEX_BUILD_ACTION_UNSPECIFIED = 0;
    INDEX_BUILD_ACTION_UPSERT      = 1;  // 插入或更新
    INDEX_BUILD_ACTION_DELETE      = 2;  // 按 document_id 删除
    INDEX_BUILD_ACTION_REBUILD     = 3;  // 清空索引后重建（慎用）
}

message EmbeddingVector {
    repeated float values = 1 [packed = true];
}

message IndexDocument {
    string document_id = 1;                           // 文档唯一标识（需符合索引引擎的 ID 规则）
    string content = 2;                               // 原始文本，供索引服务自动向量化（可选）
    map<string, string> fields = 3;                   // 结构化字段：key=字段名, value=JSON 字符串或纯文本
    map<string, EmbeddingVector> vectors = 4;         // 预计算向量：key=embedder 名称（如 "default"）
}

message IndexBuildInput {
    string index_name = 1;                            // 目标索引名称，如 "thesaurus"
    IndexBuildAction action = 2;                      // 操作类型
    repeated IndexDocument documents = 3;             // 文档批次
    map<string, string> config = 4;                   // 索引级配置覆盖（如 searchableAttributes, embedder 参数等）
}

message IndexBuildOutput {
    string index_name = 1;
    int32 success_count = 2;
    int32 failed_count = 3;
    repeated string failed_document_ids = 4;
    string message = 5;                               // 错误摘要或成功提示
}
