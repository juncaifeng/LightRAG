syntax = "proto3";

package lightrag.eventbus.topics.v1;

option go_package = "github.com/juncaifeng/LightRAG/go-eventbus/sdk/v1/go/topics;topics";

// ==========================================
// rag.insert.chunking
// ==========================================

message ChunkingInput {
    string content = 1;                             // 原始文档内容
    bytes tokenizer = 2;                            // 序列化的 Tiktoken tokenizer
    int32 chunk_token_size = 3;                     // chunk token 大小 (默认 1200)
    int32 chunk_overlap_token_size = 4;             // 重叠 token 数 (默认 100)
    string split_by_character = 5;                  // 分隔符
    bool split_by_character_only = 6;               // 仅按字符分割 (默认 false)
}

message ChunkingOutput {
    repeated ChunkItem chunks = 1;                  // 分块结果列表
}

message ChunkItem {
    string content = 1;                             // chunk 文本内容
    int32 tokens = 2;                               // token 数量
    int32 chunk_order_index = 3;                    // chunk 在文档中的序号
}

// ==========================================
// rag.insert.ocr
// ==========================================

message OcrInput {
    bytes image = 1;                                // 图片二进制数据
    string language = 2;                            // OCR 语言 (默认 auto)
}

message OcrOutput {
    string text = 1;                                // OCR 识别的文本
}

// ==========================================
// 通用类型 — MinIO 存储引用
// ==========================================

message StorageRef {
    string bucket = 1;                              // MinIO bucket 名称
    string object_key = 2;                          // 对象唯一键（含路径前缀）
    int64 size_bytes = 3;                           // 对象大小（字节）
    string content_hash = 4;                        // 内容 MD5 hash（用于去重和校验）
    string content_type = 5;                        // MIME 类型（如 "application/json"）
}

// ==========================================
// rag.insert.load.text
// ==========================================

message LoadTextInput {
    string storage_bucket = 1;                      // MinIO bucket（存放原始文件）
    string storage_key = 2;                         // MinIO 对象键（原始文件路径）
    string file_name = 3;                           // 文件名（含扩展名）
    string file_path = 4;                           // 原始文件路径（可选，用于日志/citation）
    string track_id = 5;                            // 追踪 ID（可选）
}

message LoadTextOutput {
    StorageRef json_ref = 1;                        // 解析后的结构化 JSON 存储引用
    string file_name = 2;                           // 回显文件名
    string file_path = 3;                           // 回显文件路径
    string content_hash = 4;                        // 原始文件 MD5 hash（用于去重）
    int64 total_pages = 5;                          // 页数（纯文本通常为 1）
    int64 total_blocks = 6;                         // 解析出的 block 数量
    repeated string block_types = 7;                // 包含的 block 类型列表（如 "text"）
    string inline_preview = 8;                      // 前 2KB 文本预览（调试/快速决策用）
    string error_message = 9;                       // 错误信息（空字符串=成功）
}

// ==========================================
// rag.insert.load.pdf
// ==========================================

message LoadPdfInput {
    string storage_bucket = 1;                      // MinIO bucket（存放原始 PDF）
    string storage_key = 2;                         // MinIO 对象键（原始 PDF 路径）
    string file_name = 3;                           // 文件名（含扩展名）
    string file_path = 4;                           // 原始文件路径（可选）
    string track_id = 5;                            // 追踪 ID（可选）
    string loading_engine = 6;                      // 加载引擎："native"（pypdf）/ "docling"（默认 "native"）
    string decrypt_password = 7;                    // PDF 解密密码（可选）
}

message LoadPdfOutput {
    StorageRef json_ref = 1;                        // 解析后的结构化 JSON 存储引用
    string file_name = 2;                           // 回显文件名
    string file_path = 3;                           // 回显文件路径
    string content_hash = 4;                        // 原始文件 MD5 hash（用于去重）
    int64 total_pages = 5;                          // PDF 总页数
    int64 total_blocks = 6;                         // 解析出的 block 数量
    repeated string block_types = 7;                // 包含的 block 类型列表（如 "text", "image", "table"）
    repeated string pending_jobs = 8;               // 下游待处理任务（如 "ocr", "formula_check"）
    string inline_preview = 9;                      // 前 2KB 文本预览（调试/快速决策用）
    string error_message = 10;                      // 错误信息（空字符串=成功）
}

// ==========================================
// rag.insert.load.docx
// ==========================================

message LoadDocxInput {
    string storage_bucket = 1;                      // MinIO bucket（存放原始 DOCX）
    string storage_key = 2;                         // MinIO 对象键（原始 DOCX 路径）
    string file_name = 3;                           // 文件名（含扩展名）
    string file_path = 4;                           // 原始文件路径（可选）
    string track_id = 5;                            // 追踪 ID（可选）
    string loading_engine = 6;                      // 加载引擎："native"（python-docx）/ "docling"（默认 "native"）
}

message LoadDocxOutput {
    StorageRef json_ref = 1;                        // 解析后的结构化 JSON 存储引用
    string file_name = 2;                           // 回显文件名
    string file_path = 3;                           // 回显文件路径
    string content_hash = 4;                        // 原始文件 MD5 hash（用于去重）
    int64 total_pages = 5;                          // 页数（DOCX 通常为 1）
    int64 total_blocks = 6;                         // 解析出的 block 数量
    repeated string block_types = 7;                // 包含的 block 类型列表
    string inline_preview = 8;                      // 前 2KB 文本预览（调试/快速决策用）
    string error_message = 9;                       // 错误信息（空字符串=成功）
}
