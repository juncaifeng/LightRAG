syntax = "proto3";

package lightrag.eventbus.topics.v1;

import "index/builder.proto";

option go_package = "github.com/juncaifeng/LightRAG/go-eventbus/sdk/v1/go/topics;topics";

// ==========================================
// rag.insert.chunking
// ==========================================

message ChunkingInput {
    string content = 1;                             // 原始文档内容
    bytes tokenizer = 2;                            // 序列化的 Tiktoken tokenizer
    int32 chunk_token_size = 3;                     // chunk token 大小 (默认 1200)
    int32 chunk_overlap_token_size = 4;             // 重叠 token 数 (默认 100)
    string split_by_character = 5;                  // 分隔符
    bool split_by_character_only = 6;               // 仅按字符分割 (默认 false)
}

message ChunkingOutput {
    repeated ChunkItem chunks = 1;                  // 分块结果列表
}

message ChunkItem {
    string content = 1;                             // chunk 文本内容
    int32 tokens = 2;                               // token 数量
    int32 chunk_order_index = 3;                    // chunk 在文档中的序号
}

// ==========================================
// rag.insert.embedding
// ==========================================

message EmbeddingInput {
    repeated string texts = 1;                      // 待嵌入的文本列表
}

message EmbeddingOutput {
    repeated EmbeddingVector embeddings = 1;        // 嵌入结果列表 (与输入 texts 顺序一一对应)
}

// ==========================================
// rag.insert.ocr
// ==========================================

message OcrInput {
    bytes image = 1;                                // 图片二进制数据
    string language = 2;                            // OCR 语言 (默认 auto)
}

message OcrOutput {
    string text = 1;                                // OCR 识别的文本
}

// ==========================================
// rag.insert.document_load
// ==========================================

message DocumentLoadInput {
    bytes file_content = 1;                         // 文件二进制内容
    string file_name = 2;                           // 文件名（含扩展名，用于格式判断）
    string file_path = 3;                           // 原始文件路径（可选，用于日志/citation）
    string track_id = 4;                            // 追踪 ID（可选）
    string loading_engine = 5;                      // 加载引擎偏好："native" / "docling"（默认 "native"）
    string pdf_decrypt_password = 6;                // PDF 解密密码（可选）
}

message DocumentLoadOutput {
    string content = 1;                             // 提取的纯文本内容
    string file_name = 2;                           // 回显文件名
    string file_path = 3;                           // 回显文件路径
    string content_hash = 4;                        // 内容 MD5 hash（用于去重）
    int64 content_length = 5;                       // 提取文本长度
    string file_format = 6;                         // 识别的文件格式（如 "pdf", "docx", "txt"）
    string error_message = 7;                       // 错误信息（空字符串=成功）
}
