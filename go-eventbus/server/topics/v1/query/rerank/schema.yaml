inputs:
  - name: query
    type: string
    required: true
    description: "用户原始查询"
    description_en: "User's original query"
  - name: chunks
    type: JSON
    required: true
    description: "待排序的文本块列表"
    description_en: "Chunks to be reranked"
  - name: enable_rerank
    type: bool
    required: false
    description: "是否启用重排序"
    description_en: "Enable reranking"
    default: "true"
outputs:
  - name: ranked_chunks
    type: JSON
    required: true
    description: "排序后的文本块列表"
    description_en: "Reranked chunk list"
