inputs:
  - name: query
    type: string
    required: true
    description: "用户原始查询"
    description_en: "User's original query"
  - name: top_k
    type: int32
    required: false
    description: "检索数量"
    description_en: "Number of chunks to retrieve"
    default: "20"
  - name: enable_rerank
    type: bool
    required: false
    description: "是否在检索后重排序"
    description_en: "Enable reranking after retrieval"
    default: "true"
outputs:
  - name: chunks
    type: JSON
    required: true
    description: "文本块列表: [{chunk_id, content, file_path, similarity, ...}]"
    description_en: "Chunk list: [{chunk_id, content, file_path, similarity, ...}]"
