inputs:
  - name: hl_keywords
    type: JSON
    required: true
    description: "高层关键词列表"
    description_en: "High-level keyword list"
  - name: ll_keywords
    type: JSON
    required: true
    description: "低层关键词列表"
    description_en: "Low-level keyword list"
  - name: expansion_config
    type: JSON
    required: false
    description: "扩词配置: {synonym: bool, near_synonym: bool, terminology: bool, max_expansion_per_keyword: int}"
    description_en: "Expansion config: {synonym: bool, near_synonym: bool, terminology: bool, max_expansion_per_keyword: int}"
outputs:
  - name: expanded_hl_keywords
    type: JSON
    required: true
    description: "扩词后的高层关键词列表"
    description_en: "Expanded high-level keyword list"
  - name: expanded_ll_keywords
    type: JSON
    required: true
    description: "扩词后的低层关键词列表"
    description_en: "Expanded low-level keyword list"
  - name: expansion_metadata
    type: JSON
    required: false
    description: "扩词元数据: {source, hit_rate}"
    description_en: "Expansion metadata: {source, hit_rate}"
